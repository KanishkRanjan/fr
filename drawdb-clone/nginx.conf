server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Validator API (same-origin, so the browser needs no CORS setup)
    location ~ ^/(health|validate|compare-names|questions) {
        proxy_pass http://validator:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
